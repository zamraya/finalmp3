<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      background: url('/images/background.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #7393b3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }

    .navbar .logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
      background: linear-gradient(100deg, #F5DCE0, #E4A0B7, #E18AAA);
      padding: 5px;
    }

    .navbar .login-icon {
      font-size: 24px;
      cursor: pointer;
      transition: color 0.3s;
    }

    .navbar .login-icon:hover {
      color: #ddd;
    }

    .player-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      width: 700px;
      margin: auto;
    }

    .track-details {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
    }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
      width: 100%;
      justify-items: center;
    }

    .album-item {
      background-color: #f0ffff;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      transition: transform 0.3s;
      width: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .album-item:hover {
      transform: scale(1.05);
    }

    .album-item img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">
      <a href="login.html">
        <img src="/images/logo.jpg" alt="Logo">
      </a>
    </div>
    <a href="login.html" class="login-icon">
      <i class="fas fa-sign-in-alt"></i>
    </a>
  </div>

  <div class="player-container">
    <div class="track-details">
      LANY
    </div>

    <div class="album-grid" id="albumGrid"></div>
  </div>

  <script>
    const tracks = [
      {
        video: '/videos/pinkskies.mp4',
        img: '/images/pinkskies.jpg',
        title: 'PINK SKIES',
        artist: 'LANY'
      },
      {
        video: '/videos/superfar.mp4',
        img: '/images/superfar.jpg',
        title: 'SUPER FAR',
        artist: 'LANY'
      },
      {
        video: '/videos/ilysb.mp4',
        img: '/images/ILYSB.jpg',
        title: 'ILYSB',
        artist: 'LANY'
      },
      {
        video: '/videos/thick&thin.mp4',
        img: '/images/thick&thin.jpg',
        title: 'THICK & THIN',
        artist: 'LANY'
      },
      {
        video: '/videos/thruthesetears.mp4',
        img: '/images/thruthesetears.jpg',
        title: 'THRU THESE TEARS',
        artist: 'LANY'
      },
      {
        video: '/videos/XXL.mp4',
        img: '/images/xxl.jpg',
        title: 'XXL',
        artist: 'LANY'
      },
      {
        video: '/videos/alonica.mp4',
        img: '/images/alonica.jpg',
        title: 'ALONICA',
        artist: 'LANY'
      },
      {
        video: '/videos/you.mp4',
        img: '/images/you.jpg',
        title: 'YOU',
        artist: 'LANY'
      },
    ];

    function displayAlbum() {
  tracks.forEach((track, index) => {
    const albumItem = document.createElement('div');
    albumItem.classList.add('album-item');
    albumItem.innerHTML = `
      <img src="${track.img}" alt="${track.title}">
      <h4>${track.title}</h4>
      <p>${track.artist}</p>
    `;
    albumItem.addEventListener('click', () => {
      const videoUrl = encodeURIComponent(track.video);
      const videoTitle = encodeURIComponent(track.title);
      const videoArtist = encodeURIComponent(track.artist);
      window.location.href = `video.html?video=${videoUrl}&title=${videoTitle}&artist=${videoArtist}`;
    });
    albumGrid.appendChild(albumItem);
  });
}

    displayAlbum();
  </script>
  
</body>
</html>
